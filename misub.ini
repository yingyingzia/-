[custom]

;启用规则生成
enable_rule_generator=true

;覆盖订阅原有规则，确保规则顺序生效
overwrite_original_rules=true


;==============================
; 规则设置
;==============================

ruleset=DIRECT,https://raw.githubusercontent.com/AGWA5783/Profiles/master/Surge/Ruleset/Unbreak.list

ruleset=YouTube,https://raw.githubusercontent.com/AGWA5783/Profiles/master/Surge/Ruleset/StreamingMedia/Video/YouTube.list
ruleset=Netflix,https://raw.githubusercontent.com/AGWA5783/Profiles/master/Surge/Ruleset/StreamingMedia/Video/Netflix.list
ruleset=Disney,https://raw.githubusercontent.com/AGWA5783/Profiles/master/Surge/Ruleset/StreamingMedia/Video/DisneyPlus.list
ruleset=Bahamut,https://raw.githubusercontent.com/AGWA5783/Profiles/master/Surge/Ruleset/StreamingMedia/Video/Bahamut.list
ruleset=Bilibili,https://raw.githubusercontent.com/AGWA5783/Profiles/master/Surge/Ruleset/StreamingMedia/StreamingSE.list

ruleset=Telegram,https://raw.githubusercontent.com/AGWA5783/Profiles/master/Surge/Ruleset/Extra/Telegram/Telegram.list
ruleset=Steam,https://raw.githubusercontent.com/AGWA5783/Profiles/master/Surge/Ruleset/Extra/Game/Steam.list
ruleset=PayPal,https://raw.githubusercontent.com/AGWA5783/Profiles/master/Surge/Ruleset/Extra/PayPal.list

ruleset=Bybit EU,[]DOMAIN-SUFFIX,bybit.eu


;==============================
; 小红书 / RedNote 分流
; 必须放在 Global、China、GEOIP,CN 前面
;==============================

;BlackMatrix7 小红书规则集
ruleset=RedNote,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/XiaoHongShu/XiaoHongShu.list

;小红书国内版主要域名
ruleset=RedNote,[]DOMAIN-SUFFIX,xiaohongshu.com
ruleset=RedNote,[]DOMAIN-SUFFIX,xingin.com
ruleset=RedNote,[]DOMAIN-SUFFIX,xhscdn.com
ruleset=RedNote,[]DOMAIN-SUFFIX,xhscdn.net
ruleset=RedNote,[]DOMAIN-SUFFIX,xhslink.com
ruleset=RedNote,[]DOMAIN-SUFFIX,xhscdn.com.cn
ruleset=RedNote,[]DOMAIN-SUFFIX,fengkongcloud.com

;小红书 API 与静态资源关键词兜底
ruleset=RedNote,[]DOMAIN-KEYWORD,xiaohongshu
ruleset=RedNote,[]DOMAIN-KEYWORD,xingin
ruleset=RedNote,[]DOMAIN-KEYWORD,xhscdn
ruleset=RedNote,[]DOMAIN-KEYWORD,xhslink

;海外版 RedNote
ruleset=RedNote,[]DOMAIN-SUFFIX,rednote.com
ruleset=RedNote,[]DOMAIN-SUFFIX,rednote.net
ruleset=RedNote,[]DOMAIN-KEYWORD,rednote


;==============================
; 其他服务
;==============================

ruleset=OpenAI,https://raw.githubusercontent.com/AGWA5783/Profiles/master/Surge/Ruleset/Extra/OpenAI/OpenAI.list
ruleset=Apple,https://raw.githubusercontent.com/AGWA5783/Profiles/master/Surge/Ruleset/Extra/Apple/Apple.list

;国际代理规则
ruleset=Proxies,https://raw.githubusercontent.com/AGWA5783/Profiles/master/Surge/Ruleset/Global.list

;中国大陆与局域网直连
;必须放在 RedNote 规则后面
ruleset=DIRECT,https://raw.githubusercontent.com/AGWA5783/Profiles/master/Surge/Ruleset/China.list
ruleset=DIRECT,https://raw.githubusercontent.com/AGWA5783/Profiles/master/Surge/Ruleset/LocalAreaNetwork.list

ruleset=DIRECT,[]GEOIP,CN

;最终规则
ruleset=Final,[]MATCH


;==============================
; 策略组设置
;==============================

custom_proxy_group=Proxies`select`[]HK`[]JP`[]SG`[]TW`[]US`.*

custom_proxy_group=YouTube`select`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US
custom_proxy_group=Netflix`select`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US
custom_proxy_group=Disney`select`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US

custom_proxy_group=Bahamut`select`[]Proxies`[]HK`[]TW
custom_proxy_group=Bilibili`select`[]DIRECT`[]HK`[]TW

custom_proxy_group=Telegram`select`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US
custom_proxy_group=Steam`select`[]Proxies`[]DIRECT`[]HK`[]JP`[]SG`[]TW`[]US
custom_proxy_group=PayPal`select`[]Proxies`[]DIRECT`[]HK`[]JP`[]SG`[]TW`[]US

custom_proxy_group=Bybit EU`select`[]Proxies`[]DIRECT`[]HK`[]JP`[]SG`[]TW`[]US`.*

;小红书 / RedNote 策略组
custom_proxy_group=RedNote`select`[]Proxies`[]DIRECT`[]HK`[]JP`[]SG`[]TW`[]US

custom_proxy_group=OpenAI`select`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US
custom_proxy_group=Apple`select`[]Proxies`[]DIRECT`[]HK`[]JP`[]SG`[]TW`[]US

custom_proxy_group=Final`select`[]Proxies`[]DIRECT


;==============================
; 地区节点组
;==============================

custom_proxy_group=HK`select`港|香港|HK|Hong Kong`http://www.gstatic.com/generate_204`600

custom_proxy_group=SG`select`新|新加坡|狮城|獅城|SG|Singapore`http://www.gstatic.com/generate_204`600

custom_proxy_group=TW`select`台|台湾|台灣|新北|彰化|深台|CHT|HINET|TW|Taiwan`http://www.gstatic.com/generate_204`600

custom_proxy_group=JP`select`日((?!用).)+|[^-]日|东京|東京|大阪|埼玉|JP|Japan`http://www.gstatic.com/generate_204`600

custom_proxy_group=US`select`美|美国|美國|洛杉矶|洛杉磯|圣何塞|聖何塞|西雅图|西雅圖|US|USA|United States`http://www.gstatic.com/generate_204`600